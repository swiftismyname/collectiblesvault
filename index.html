function applyFont(key) {
  const f = FONT_PAIRS[key] || FONT_PAIRS.vault;
  // Load extra Google Font if needed (vault fonts are already in the main link)
  const link = document.getElementById('cv-font-extra');
  if (key !== 'vault' && link) {
    const families = [...new Set([f.display, f.body])].join('&family=');
    link.href = 'https://fonts.googleapis.com/css2?family=' + families + '&display=swap';
  }
  // Apply CSS variables to :root
  document.documentElement.style.setProperty('--font-display', f.cssDisplay);
  document.documentElement.style.setProperty('--font-body', f.cssBody);
}

function setFont(key) {
  localStorage.setItem('cv_font', key);
  applyFont(key);
  if (ST && ST.view === 'settings') renderSettings();
}

// Apply saved font on load
applyFont(localStorage.getItem('cv_font') || 'vault');

function saveSupabaseConfig() {
  const url = (document.getElementById('sb-url-input') || {}).value || '';
  const key = (document.getElementById('sb-key-input') || {}).value || '';
  if (!url.trim() || !key.trim()) { alert('Both the Supabase URL and Anon Key are required.'); return; }
  SB_URL = url.trim().replace(/\/+$/, '');
  SB_KEY = key.trim();
  localStorage.setItem('cv_sb_url', SB_URL);
  localStorage.setItem('cv_sb_key', SB_KEY);
  renderSettings();
  loadFromSupabase();
}

// ── Auto-sync both backends on every load ────────────────────────────────────
(async function bootSync() {
  const hasSB     = !!(SB_URL && SB_KEY);
  const hasSheets = !!GSHEETS_URL;

  if (hasSB) {
    // Primary: load fresh data from Supabase
    await loadFromSupabase();
  }

  if (hasSheets) {
    // Parallel: flush any pending edits to Google Sheets and pull latest
    retryPendingSync().then(async synced => {
      await loadFromSheets(GSHEETS_URL);
      // If Supabase is also connected, update banner to show both are synced
      if (hasSB) {
        updateSyncBanner('ok', 'Supabase ✓ · Sheets ✓ · ' + new Date().toLocaleTimeString());
      }
    }).catch(err => {
      console.warn('[Boot] Sheets sync failed:', err.message);
    });
  }

  if (!hasSB && !hasSheets) {
    checkSyncState();
    loadSpotPrices();
  }
})();

function saveEditedRecord(sheetKey, recordId) {
  const modal = document.getElementById('edit-modal');
  if (!modal) return;
  const inputs = modal.querySelectorAll('input[data-field]');
  const updates = {};
  const arr = D[sheetKey];
  if (!arr) { alert('Sheet not found'); return; }
  // Use normalized ID matching so "1", "0001", "001", "1.0" all find the same record
  const recIdx = arr.findIndex(r => normId(r.id) === normId(recordId));
  if (recIdx < 0) { alert('Record not found: #' + cn(recordId) + ' in ' + sheetKey); return; }
  const original = arr[recIdx];

  const changed = [];
  const changedOnly = {};  // only the fields that actually changed — stored in PENDING_EDITS
  inputs.forEach(inp => {
    const v = inp.value;
    const f = inp.dataset.field;
    let newVal;
    if (/^-?[0-9]*\.?[0-9]+$/.test(v) && v !== '') newVal = parseFloat(v);
    else newVal = v;
    updates[f] = newVal;
    const orig = original[f];
    const origStr = orig == null ? '' : String(orig);
    const newStr  = newVal == null ? '' : String(newVal);
    if (origStr !== newStr) {
      changed.push(f + ': ' + (origStr || '(blank)') + ' → ' + (newStr || '(blank)'));
      changedOnly[f] = newVal;
    }
  });

  if (changed.length === 0) {
    if (!confirm('No fields appear to have changed. Save anyway?')) {
      modal.remove();
      return;
    }
  }

  // Apply locally
  Object.assign(arr[recIdx], updates);

  // Persist to PENDING_EDITS — if the id field itself changed, move the key to the new id
  const idChanged = changedOnly.hasOwnProperty('id');
  const oldPendKey = sheetKey + '|' + cn(recordId);
  const newPendKey = idChanged ? sheetKey + '|' + cn(String(changedOnly.id)) : oldPendKey;
  if (idChanged && oldPendKey !== newPendKey) {
    delete PENDING_EDITS[oldPendKey];
  }
  PENDING_EDITS[newPendKey] = { ...(PENDING_EDITS[newPendKey] || {}), ...changedOnly };
  savePendingEdits();
  NEW_RECORDS = NEW_RECORDS.map(nr => (nr.sheet === sheetKey && String(nr.id) === String(recordId)) ? { ...nr, ...updates } : nr);
  saveNR();
  buildFlat();
  updateBadges();
  refreshSidebarTotal();
  modal.remove();
  closeDetail();
  if (ST.view === 'inv')        renderInv();
  else if (ST.view === 'dups')  renderDups();
  else if (ST.view === 'dash')  renderDash();
  else if (ST.view === 'labels') renderLabels();

  // Show alert ALWAYS so user has confirmation
  const summary = '✓ Record #' + cn(recordId) + ' updated locally\n\nChanges:\n' + (changed.length > 0 ? changed.join('\n') : '(no field-level changes detected)');

  if (GSHEETS_URL) {
    alert(summary + '\n\nSyncing to Google Sheets in the background…');
    updateRecordInSheets(sheetKey, recordId, updates).then(syncOk => {
      if (syncOk) {
        // Clear from PENDING_EDITS — the change is confirmed in Sheets
        delete PENDING_EDITS[newPendKey];
        savePendingEdits();
        console.log('[Sync OK] Record #' + cn(recordId) + ' saved to Sheets. PENDING_EDITS cleared.');
      } else {
        console.warn('[Sync FAILED] Record #' + cn(recordId) + ' kept in PENDING_EDITS so the change persists across reloads.');
        updateSyncBanner('error', 'Edit saved locally — Sheets sync failed. Check Apps Script deployment.');
      }
    });
  } else {
    alert(summary + '\n\nNote: Google Sheets is not connected. Edit is saved in this browser only.');
  }
}

async function updateRecordInSheets(sheetKey, id, updates) {
  // Route to Supabase if configured, fall back to GAS/Sheets
  if (SB_URL && SB_KEY) {
    try {
      await updateInSupabase(sheetKey, id, updates);
      return true;
    } catch(err) {
      updateSyncBanner('error', 'Supabase update failed: ' + err.message);
      return false;
    }
  }
  if (!GSHEETS_URL) return false;
  updateSyncBanner('sync');
  try {
    const url = GSHEETS_URL + '?action=updateRecord&sheet=' + encodeURIComponent(sheetKey)
              + '&id=' + encodeURIComponent(String(id))
              + '&data=' + encodeURIComponent(JSON.stringify(updates));
    console.log('[updateRecordInSheets] URL:', url.substring(0, 200) + '...');
    const r = await fetch(url);
    const responseText = await r.text();
    console.log('[updateRecordInSheets] Response:', responseText.substring(0, 500));
    
    let d;
    try {
      d = JSON.parse(responseText);
    } catch(parseErr) {
      throw new Error('Invalid JSON response from Apps Script: ' + responseText.substring(0, 200));
    }
    
    if (!d || !d.ok) {
      const errMsg = (d && d.error) || 'Update failed (no error details)';
      console.error('[updateRecordInSheets] Server returned error:', d);
      throw new Error(errMsg);
    }
    
    if (d.fields) {
      console.log('[Sheets sync] Record #' + cn(id) + ' field mapping:\n  ' + d.fields.join('\n  '));
      // New columns auto-created by the Apps Script are reported as
      // "→ NEW col N (header added)" — flag them in the banner so the user
      // knows their sheet got a new column.
      const newCols = d.fields.filter(f => f.includes('NEW col'));
      if (newCols.length > 0) {
        const names = newCols.map(f => { const m = f.match(/"([^"]+)"/); return m ? m[1] : f; });
        console.info('[Sheets sync] New columns added to sheet:', names);
        // Don't treat this as an error — it's expected when lookup fields
        // (e.g. diameter, designer, kmNumber from Numista) are written for the first time.
      }
    }
    updateSyncBanner('ok', new Date().toISOString());
    return true;
  } catch(e) {
    console.error('[updateRecordInSheets] Full error:', e);
    updateSyncBanner('error', 'Edit sync failed: ' + e.message);
    return false;
  }
}

const SHEET_LABELS = {
  gold:'Gold Bullion',silver:'Silver Bullion',copper:'Copper Bullion',
  platinum:'Platinum',palladium:'Palladium',mintSets:'US Mint Sets',
  gradedSilver:'Graded Silver Coins',rawSilver:'Raw Silver Coins',
  gradedUS:'Graded US Coins',rawUS:'Raw US Coins',
  gradedForeign:'Graded Foreign Coins',rawForeign:'Raw Foreign Coins',
  usNotes:'US Notes',confederate:'Confederate Notes',obsolete:'Obsolete Notes',
  foreignNotes:'Foreign Notes',fractional:'Fractional Currency',
  ancient:'Ancient Coins',other:'Other'
};

let ADD_SHEET = 'gradedSilver';


// ── Barcode scanner support ───────────────────────────────────────────────────
// Most USB barcode scanners type characters rapidly and end with Enter.
// We detect this pattern globally so the user can scan from ANY tab.
let _scanBuffer = '';
let _scanLastTime = 0;

document.addEventListener('keydown', function(ev) {
  // Ignore if user is actively typing in an input/textarea/select
  const tag = (ev.target && ev.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

  const now = Date.now();
  const gap = now - _scanLastTime;
  _scanLastTime = now;

  if (ev.key === 'Enter') {
    // End of scan: if buffer has content, treat as barcode
    if (_scanBuffer.length >= 1) {
      const code = _scanBuffer;
      _scanBuffer = '';
      // Switch to inventory tab and search for this code
      ST.search = code;
      ST.page = 1;
      nav('inv');
      // After render, focus the search input
      setTimeout(function() {
        const inp = document.getElementById('inv-search-input');
        if (inp) { inp.focus(); inp.select(); }
      }, 50);
      ev.preventDefault();
    }
    return;
  }
  // Accept printable single chars only
  if (ev.key && ev.key.length === 1) {
    if (gap > 500) _scanBuffer = '';  // gap too long: reset (likely human typing)
    _scanBuffer += ev.key;
  }
});

// When user presses Enter inside the inventory search, open the first matching record

// Debounced inventory search — coalesces rapid keystrokes from barcode scanners
let _invSearchDebounce = null;
function onInvSearch(v) {
  ST.search = v;
  ST.page = 1;
  if (_invSearchDebounce) clearTimeout(_invSearchDebounce);
  _invSearchDebounce = setTimeout(function(){ renderInv(); }, 200);
}

function focusFirstInvResult() {
  // After current renderInv, the first row will exist — pick it
  const firstRow = document.querySelector('#content table tbody tr');
  if (firstRow) firstRow.click();
}

function renderAdd(){
  const schema = SCHEMAS[ADD_SHEET] || [];
  const sheetOpts = Object.entries(SHEET_LABELS).map(([k,l])=>
    '<option value="'+k+'"'+(k===ADD_SHEET?' selected':'')+'>'+l+'</option>'
  ).join('');
  const fields = schema.map(f=>
    '<div style="margin-bottom:12px">'
    +'<label style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:4px">'+f.l+'</label>'
    +'<input type="'+(f.t||'text')+'" id="af-'+f.f+'" placeholder="'+(f.ph||'')+'" style="width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px">'
    +'</div>'
  ).join('');

  // Suggest next available ID for this sheet
  const arr = D[ADD_SHEET] || [];
  const existingIds = arr.map(r => parseInt(cn(r.id)) || 0).filter(n => !isNaN(n));
  const allIds = ALL_ITEMS.map(r => parseInt(cn(r.id)) || 0).filter(n => !isNaN(n));
  const suggestedId = Math.max(...existingIds, ...allIds, MAX_EXISTING_ID, 0) + 1;

  document.getElementById('content').innerHTML =
    '<div class="vh"><div><div class="vt">Add Record</div><div class="vsub">Add a new item to your collection</div></div></div>'
    +'<div style="max-width:560px">'
    +'<div style="margin-bottom:20px"><label style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:6px">Category</label>'
    +'<select onchange="ADD_SHEET=this.value;renderAdd()" style="width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px">'+sheetOpts+'</select></div>'
    +'<div style="margin-bottom:20px;padding:14px;background:var(--bg3);border:1px solid var(--gold3);border-radius:6px">'
    +'<label style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:6px">Record Number</label>'
    +'<div style="display:flex;gap:8px;align-items:center">'
    +'<input type="text" id="af-id" placeholder="Leave blank to auto-assign #'+suggestedId+'" style="flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;font-family:monospace">'
    +'<button type="button" onclick="document.getElementById(\'af-id\').value='+suggestedId+'" class="bg" style="white-space:nowrap;font-size:11px">Use #'+suggestedId+'</button>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--muted);margin-top:6px">Scan a barcode here or type manually. Leave blank for auto-assignment.</div>'
    +'</div>'
    +fields
    +'<div style="display:flex;gap:10px;margin-top:8px">'
    +'<button class="bp" onclick="submitAdd()" style="flex:1">Add to Collection</button>'
    +'<button class="bg" onclick="resetAdd();renderAdd()" style="flex:1">Clear</button>'
    +'</div></div>';
}

function resetAdd(){
  document.querySelectorAll('[id^="af-"]').forEach(el=>el.value='');
}


// Duplicate the last-added record with a new auto-incremented ID and blank cost/value
function duplicateLastRecord() {
  const cat = ST.addCat;
  if (!cat || !SCHEMAS[cat]) {
    alert('Please select a category first');
    return;
  }
  
  const arr = D[cat] || [];
  if (arr.length === 0) {
    alert('No existing records to duplicate in this category');
    return;
  }
  
  // Find the most-recently-added record (highest ID)
  const last = arr.reduce((a, b) => (parseFloat(a.id) > parseFloat(b.id) ? a : b));
  
  // Pre-fill the form with the last record's values
  const schema = SCHEMAS[cat];
  schema.forEach(field => {
    const inp = document.getElementById('af-' + field.f);
    if (!inp) return;
    
    // Special handling for certain fields
    if (field.f === 'id') {
      // Leave blank — will auto-suggest next
      inp.value = '';
    } else if (['cost', 'value', 'meltValue', 'uncertValue'].includes(field.f)) {
      // Clear monetary values so user can enter new ones
      inp.value = '';
    } else if (last[field.f] != null) {
      // Copy everything else
      inp.value = last[field.f];
    }
  });
  
  // Scroll to top of add form
  document.getElementById('content').scrollTop = 0;
  
  // Focus the ID field
  const idInput = document.getElementById('af-id');
  if (idInput) {
    idInput.focus();
    idInput.select();
  }
}

function submitAdd(){
  const schema = SCHEMAS[ADD_SHEET] || [];
  const sheet  = ADD_SHEET;
  const rec    = {};
  let missing  = [];

  schema.forEach(f=>{
    const el = document.getElementById('af-'+f.f);
    const v  = el ? el.value.trim() : '';
    if(!v && (f.f==='cost'||f.f==='weight'||f.f==='weightG')) missing.push(f.l);
    rec[f.f] = f.t==='number' ? (parseFloat(v)||0) : v;
  });

  if(missing.length){ alert('Please fill in: '+missing.join(', ')); return; }

  // Read user-provided ID (optional)
  const idInput = document.getElementById('af-id');
  const userId  = idInput ? idInput.value.trim() : '';
  const arr = D[sheet] || [];

  if (userId) {
    // User typed/scanned an ID — validate it
    const cleanId = normId(userId); // normId strips leading zeros so "0001"=="1"
    // Check uniqueness across ENTIRE collection (since IDs may collide cross-sheet)
    const exists = ALL_ITEMS.find(i => normId(i.id) === cleanId);
    if (exists) {
      const sm = SHEET_MAP[exists.sheet];
      alert('Record #' + cleanId + ' already exists in ' + (sm ? sm.label : exists.sheet) + ': "' + (exists.desc || '').substring(0,60) + '". Please use a different number.');
      return;
    }
    rec.id = cleanId;
  } else {
    // Auto-assign next available ID
    const allIdsNum = ALL_ITEMS.map(r => parseInt(cn(r.id)) || 0).filter(n => !isNaN(n));
    rec.id = String(Math.max(...allIdsNum, MAX_EXISTING_ID, 0) + 1);
  }
  rec._localId = Date.now();

  arr.push(rec);
  D[sheet] = arr;
  NEW_RECORDS.push({sheet, ...rec});
  saveNR(); buildFlat(); updateBadges(); checkSyncState();

  if(GSHEETS_URL){
    const btn=document.querySelector('#content button.bp');
    if(btn){btn.disabled=true;btn.textContent='Saving to Sheets...';}
    syncRecordToSheets(sheet, {...rec}).then(sid => {
      if (sid) alert('Record #' + cn(sid) + ' saved to Google Sheets in "' + SHEET_LABELS[sheet] + '" and queued for label.');
      else     alert('Saved locally (ID: ' + cn(rec.id) + '). Sheets sync failed — check banner for details.');
      renderAdd();
    });
  } else {
    alert('Record #'+rec.id+' added to '+SHEET_LABELS[sheet]+'.\n\nConnect Google Sheets in Settings to sync everywhere.');
    resetAdd(); renderAdd();
  }
}


// ── exportUpdatedSpreadsheet: export full collection as XLSX ──────────────────
async function exportUpdatedSpreadsheet() {
  try {
    await loadXLSX();
  } catch(e) {
    alert('Could not load XLSX library. Try the CSV export instead.');
    return;
  }
  const wb = XLSX.utils.book_new();
  const sheetDefs = [
    {key:'gold',label:'Gold Buillon'},{key:'silver',label:'Silver Buillon'},
    {key:'copper',label:'Copper Bullion'},{key:'platinum',label:'Platinum Bullion'},
    {key:'palladium',label:'Palladium Bullion'},
    {key:'gradedSilver',label:'Graded - Silver Coins'},{key:'rawSilver',label:'RAW - Silver Coins'},
    {key:'gradedUS',label:'Graded - US - Non-Silver - Coins'},{key:'rawUS',label:'RAW- US - Non-Silver - Coins'},
    {key:'gradedForeign',label:'Graded - Foreign Coins'},{key:'rawForeign',label:'RAW - Foreign Coins'},
    {key:'usNotes',label:'US Notes'},{key:'confederate',label:'Confederate Notes'},
    {key:'obsolete',label:'Obsolete Notes'},{key:'foreignNotes',label:'Foreign Notes'},
    {key:'fractional',label:'Fractional Currency'},{key:'mintSets',label:'US Mint Sets'},
    {key:'ancient',label:'Ancient Coins'},{key:'other',label:'Other'},
  ];
  for (const {key, label} of sheetDefs) {
    const rows = D[key] || [];
    if (rows.length === 0) continue;
    const ws = XLSX.utils.json_to_sheet(rows);
    const safeName = label.substring(0, 31);
    XLSX.utils.book_append_sheet(wb, ws, safeName);
  }
  const dt = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, 'collectibles_vault_' + dt + '.xlsx');
}

// ── clearAllData: wipe all local data (with strong warning) ──────────────────
function clearAllData() {
  if (!confirm('⚠️ WARNING: This will clear ALL locally cached data from this browser.\n\nYour Google Sheet is NOT affected — data will reload from Sheets next time.\n\nContinue?')) return;
  if (!confirm('Are you sure? This cannot be undone.')) return;
  const keys = ['cv_new_records','cv_pending_edits','cv_pending_edit_retries','cv_pending_deletes',
                 'cv_manual_labels','cv_labels_printed','cv_value_history','cv_sheet_overrides'];
  keys.forEach(k => localStorage.removeItem(k));
  NEW_RECORDS = [];
  PENDING_EDITS = {};
  PENDING_EDIT_RETRIES = {};
  PENDING_DELETES = [];
  MANUAL_LABELS = new Set();
  labelsPrinted = new Set();
  VALUE_HISTORY = [];
  alert('Local data cleared. The page will now reload.');
  location.reload();
}
