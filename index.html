/** Entry point: build query from record and open the Numista modal. */
async function lookupNumista(item) {
  const raw = item.raw;
  const type   = String(raw.type || raw.category || '').trim();
  const series = String(raw.series || '').replace(/\.0$/, '').trim();
  const denom  = String(raw.denomination || '').trim();
  const country= String(raw.country || '').trim();

  // Build search query — most useful signal is type + year
  const qParts = [type, series].filter(Boolean);
  if (!qParts.length && denom) qParts.push(denom);
  if (!qParts.length) {
    showNumistaModal(item, [], null, 'Fill in the Type and Series / Year fields first so Numista has something to search on.');
    return;
  }
  const q = qParts.join(' ');

  const btn = document.getElementById('numista-btn-' + cn(item.id));
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

  try {
    // Also pass country as issuer hint when possible
    const opts = {};
    const data = await _numistaSearch(q, opts);
    if (btn) { btn.textContent = '🌐 Numista'; btn.disabled = false; }

    if (!data.types || data.types.length === 0) {
      showNumistaModal(item, [], null, `No Numista results for "${q}". Try editing the Type or Series fields to match how Numista names this coin.`);
      return;
    }
    showNumistaModal(item, data.types, null, null);
  } catch (err) {
    if (btn) { btn.textContent = '🌐 Numista'; btn.disabled = false; }
    const isCors = err.message === 'Failed to fetch' || err.message.includes('NetworkError') || err.message.includes('CORS');
    showNumistaModal(item, [], isCors ? 'CORS' : null, isCors ? null : 'Numista search failed: ' + err.message);
  }
}

    const objType = t.object_type ? t.object_type.name : '';

      style="display:flex;gap:10px;align-items:center;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .12s"
      onmouseover="this.style.borderColor='#6ab0ff'" onmouseout="this.style.borderColor='var(--border)'">
      ${thumb ? `<img src="${e(thumb)}" style="width:46px;height:46px;object-fit:contain;border-radius:3px;background:#111;flex-shrink:0" onerror="this.style.display='none'">` : `<div style="width:46px;height:46px;background:#1a1a1a;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px">🪙</div>`}
      <div style="min-width:0">
        <div style="font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e(t.title)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${[issuer,years,objType].filter(Boolean).join(' · ')}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Numista #${t.id}</div>
      </div>
    </div>`;
  }).join('');
}

/** Fetch full type and render field checkboxes for phase 2. */
async function _numistaFieldRows(type, raw) {
  // type may be a search-result stub; fetch full details
  let full = type;
  if (!full.composition && !full.weight) {
    try { full = await _numistaGetType(type.id); } catch(e) { /* use stub */ }
  }

  const fields = [];

  // Composition
  const compText = full.composition && full.composition.text ? full.composition.text : null;
  if (compText) fields.push({ field:'composition', label:'Composition', refVal: compText, curVal: raw.composition||'' });

  // Weight — Numista gives grams; our record uses oz for silver/coins
  if (full.weight) {
    const oz = (full.weight / 31.1035).toFixed(4);
    const display = full.weight + ' g (' + oz + ' oz)';
    const isEmpty = !raw.weight || parseFloat(raw.weight) === 0;
    fields.push({ field:'weight', label:'Weight', refVal: parseFloat(oz), refDisplay: display, curVal: raw.weight||'', isEmpty });
  }

  // Diameter (Numista: size in mm)
  if (full.size) {
    fields.push({ field:'diameter', label:'Diameter', refVal: full.size + ' mm', curVal: raw.diameter||'' });
  }

  // Orientation / edge
  if (full.edge && full.edge.description) {
    fields.push({ field:'edge', label:'Edge', refVal: full.edge.description, curVal: raw.edge||'' });
  }

  // Designer from obverse engravers
  const eng = full.obverse && full.obverse.engravers && full.obverse.engravers.length
    ? full.obverse.engravers.join(', ') : null;
  if (eng) fields.push({ field:'designer', label:'Designer (Obverse)', refVal: eng, curVal: raw.designer||'' });

  // KM reference number
  const refs = full.references || [];
  const km = refs.find(r => r.catalogue && r.catalogue.code === 'KM');
  if (km && km.number) {
    const kmVal = 'KM#' + km.number;
    fields.push({ field:'kmNumber', label:'KM Reference', refVal: kmVal, curVal: raw.kmNumber||'' });
  }

  // Denomination from Numista
  if (full.value && full.value.text && (!raw.denomination || raw.denomination === '')) {
    fields.push({ field:'denomination', label:'Denomination', refVal: full.value.text, curVal: raw.denomination||'' });
  }

  // Issuer / country
  if (full.issuer && full.issuer.name && (!raw.country || raw.country === '')) {
    fields.push({ field:'country', label:'Country (Issuer)', refVal: full.issuer.name, curVal: raw.country||'' });
  }

  // Numista URL as features note
  if (full.url) {
    const note = 'Numista: ' + (full.url || 'https://en.numista.com/catalogue/type' + full.id + '.html');
    fields.push({ field:'numistaUrl', label:'Numista URL', refVal: note, curVal: raw.numistaUrl||'' });
  }

  if (!fields.length) return '<div style="text-align:center;padding:20px;color:var(--muted)">No applicable fields found in this Numista entry.</div>';

  // Build thumbnail header
  const obv = full.obverse && (full.obverse.thumbnail || full.obverse_thumbnail);
  const rev = full.reverse && (full.reverse.thumbnail || full.reverse_thumbnail);
  const imgRow = (obv||rev) ? `<div style="display:flex;gap:8px;margin-bottom:12px;justify-content:center">
    ${obv?`<img src="${e(obv)}" style="height:80px;border-radius:4px;background:#111" onerror="this.style.display='none'">`:``}
    ${rev?`<img src="${e(rev)}" style="height:80px;border-radius:4px;background:#111" onerror="this.style.display='none'">`:``}
  </div>` : '';

  let html = imgRow;
  html += `<div style="display:grid;grid-template-columns:20px 1fr 1fr 1fr;gap:4px 10px;padding:4px 8px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);border-bottom:1px solid var(--border);margin-bottom:2px">
    <span></span><span>Field</span><span>Current on Record</span><span style="color:#6ab0ff">Numista Value</span>
  </div>`;

  for (const f of fields) {
    const isEmpty = f.isEmpty !== undefined ? f.isEmpty : (!f.curVal || f.curVal === '');
    const uid   = 'nf-' + f.field;
    const vStr  = String(f.refVal).replace(/"/g,'&quot;');
    const refDp = e(f.refDisplay || String(f.refVal));
    const curDp = e(f.curVal || '—');
    html += `<div style="display:grid;grid-template-columns:20px 1fr 1fr 1fr;gap:4px 10px;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;${isEmpty?'':'opacity:.75'}">
      <input type="checkbox" id="${uid}" data-nfield="${e(f.field)}" data-nvalue="${vStr}" ${isEmpty?'checked':''} style="cursor:pointer;width:14px;height:14px;accent-color:#6ab0ff">
      <label for="${uid}" style="font-size:12px;cursor:pointer;color:var(--text)">${e(f.label)}</label>
      <span style="font-size:12px;color:var(--dim)">${curDp}</span>
      <span style="font-size:12px;color:#6ab0ff;font-weight:500">${refDp}</span>
    </div>`;
  }

  html += `<div style="padding:8px 8px 0;border-top:1px solid var(--border);margin-top:6px">
    <label style="cursor:pointer;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)">
      <input type="checkbox" style="cursor:pointer;accent-color:#6ab0ff"
        onchange="document.querySelectorAll('#numista-modal input[data-nfield]').forEach(cb=>cb.checked=this.checked)">
      Select / deselect all
    </label>
  </div>`;

  return html;
}

let _numistaModalTypes = [];

/** Main Numista lookup modal — two phases: results → field checkboxes. */
function showNumistaModal(item, types, corsErr, errMsg) {
  const existing = document.getElementById('numista-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'numista-modal';
  modal.className = 'ref-modal';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  document.body.appendChild(modal);

  _numistaModalTypes = types;
  let phase = corsErr ? 'cors' : errMsg ? 'error' : types.length ? 'results' : 'error';
  let selIdx = 0;

  window._numi_select = async (idx) => {
    selIdx = idx;
    phase = 'loading';
    _renderNumi();
    const html = await _numistaFieldRows(_numistaModalTypes[idx], item.raw);
    phase = 'fields';
    _renderNumi(html);
  };

  window._numi_back = () => { phase = 'results'; _renderNumi(); };

  window._numi_apply = () => {
    const checks = [...modal.querySelectorAll('input[data-nfield]:checked')];
    if (!checks.length) { alert('Check at least one field to apply.'); return; }
    const updates = {};
    checks.forEach(cb => {
      const field = cb.dataset.nfield;
      const val   = cb.dataset.nvalue;
      const num   = parseFloat(val);
      updates[field] = ['weight','size','diameter'].includes(field) && !isNaN(num) ? num : val;
    });
    modal.remove();
    _numistaApply(item, updates);
  };

  function _renderNumi(fieldsHtml) {
    let title = 'Numista Lookup — #' + cn(item.id);
    let subtitle = SHEET_MAP[item.sheet]?.label || item.sheet;
    let body = '', footer = '';

    if (phase === 'cors') {
      body = `<div style="background:rgba(192,80,74,.08);border:1px solid rgba(192,80,74,.25);border-radius:6px;padding:14px 16px;font-size:13px;color:var(--text);line-height:1.7">
        <b>Browser CORS restriction.</b><br><br>
        The Numista API doesn't allow direct browser requests from local HTML files due to Cross-Origin policy.<br><br>
        <b>To use Numista lookup:</b> host this app on a web server (even a local one like <code>python -m http.server</code>), or use the 
        <a href="https://en.numista.com" target="_blank" style="color:#6ab0ff">Numista website</a> directly to look up your coin.
      </div>`;
      footer = `<button class="bg" onclick="document.getElementById('numista-modal').remove()">Close</button>
        <a href="https://en.numista.com/catalogue/index.php" target="_blank" style="text-decoration:none"><button class="bp" style="background:rgba(74,144,226,.2);border-color:rgba(74,144,226,.5)">Open Numista ↗</button></a>`;

    } else if (phase === 'error') {
      body = `<div style="background:rgba(192,80,74,.08);border:1px solid rgba(192,80,74,.25);border-radius:6px;padding:14px 16px;font-size:13px;color:var(--text);line-height:1.7">${e(errMsg||'Unknown error')}</div>`;
      footer = `<button class="bg" onclick="document.getElementById('numista-modal').remove()">Close</button>`;

    } else if (phase === 'results') {
      subtitle = types.length + ' result' + (types.length !== 1 ? 's' : '') + ' — click the correct coin';
      body  = _numistaCards(types);
      footer = `<button class="bg" onclick="document.getElementById('numista-modal').remove()">Cancel</button>`;

    } else if (phase === 'loading') {
      body  = `<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">⏳ Fetching full details from Numista…</div>`;
      footer = `<button class="bg" onclick="document.getElementById('numista-modal').remove()">Cancel</button>`;

    } else { // fields
      const t = _numistaModalTypes[selIdx];
      title = 'Select Fields to Apply — #' + cn(item.id);
      subtitle = e(t.title) + (t.issuer ? ' · ' + e(t.issuer.name) : '')
        + (types.length > 1 ? ' &nbsp;<span onclick="window._numi_back()" style="cursor:pointer;text-decoration:underline;color:#6ab0ff">← change</span>' : '');
      body  = fieldsHtml || '';
      footer = (types.length > 1 ? `<button class="bg" onclick="window._numi_back()">← Back</button>` : '')
        + `<button class="bg" onclick="document.getElementById('numista-modal').remove()">Cancel</button>`
        + `<button class="bp" style="background:rgba(74,144,226,.2);border-color:rgba(74,144,226,.5);color:#6ab0ff" onclick="window._numi_apply()">Apply Selected Fields</button>`;
    }

    modal.innerHTML = `
      <div class="ref-modal-box" style="width:min(680px,96vw);max-height:90vh">
        <div class="ref-modal-head">
          <div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600">${title}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${subtitle}</div>
          </div>
          <button class="rb" onclick="document.getElementById('numista-modal').remove()" style="font-size:18px">✕</button>
        </div>
        <div class="ref-modal-body" style="overflow-y:auto;max-height:calc(90vh - 130px)">${body}</div>
        <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">${footer}</div>
      </div>`;
  }

  _renderNumi();
}

/** Apply selected Numista fields to the record. */
async function _numistaApply(item, updates) {
  const arr = D[item.sheet];
  if (!arr) return;
  const idx = arr.findIndex(r => String(r.id) === String(item.id));
  if (idx < 0) return;
  Object.assign(arr[idx], updates);
  Object.assign(item.raw, updates);
  buildFlat();
  if (ST.view === 'inv') renderInv();
  if (ST.selItem === item) showDetail(item);
  const n = Object.keys(updates).length;
  if (GSHEETS_URL) {
    try {
      await updateRecordInSheets(item.sheet, cn(item.id), updates);
      alert('✅ Record #' + cn(item.id) + ' — ' + n + ' field' + (n!==1?'s':'') + ' applied from Numista and saved to Google Sheets!');
    } catch(ex) {
      alert('Updated locally — Google Sheets sync failed: ' + ex.message);
    }
  } else {
    alert('✅ Record #' + cn(item.id) + ' — ' + n + ' field' + (n!==1?'s':'') + ' applied from Numista. Connect Google Sheets to sync.');
  }
}

// ── US COIN REFERENCE LOOKUP ──────────────────────────────────────────────────

/** Load the "US Coin Reference" tab via Anthropic API + Google Drive MCP.
 *  Returns the array of reference rows (each row is an object keyed by column header). */
async function loadCoinReference(force) {
  if (COIN_REF_DATA && !force) return COIN_REF_DATA;
  if (COIN_REF_LOADING) return null;
  COIN_REF_LOADING = true;

  // ── Strategy 1: Google Sheets gviz/tq endpoint ────────────────────────────
  // Works in the browser when the user is already signed into Google
  // (no API key needed — uses browser's existing Google session cookie).
  try {
    const gvizUrl = `https://docs.google.com/spreadsheets/d/${COIN_REF_SHEET_ID}/gviz/tq`
                  + `?tqx=out:json&gid=${COIN_REF_GID}`;
    const resp = await fetch(gvizUrl, { credentials: 'include' });
    if (!resp.ok) throw new Error('gviz HTTP ' + resp.status);

    const text = await resp.text();
    // gviz response is JSONP:  /*O_o*/\ngoogle.visualization.Query.setResponse({...});
    const jsonStr = text.replace(/^[^\(]+\(/, '').replace(/\);\s*$/, '');
    const gviz = JSON.parse(jsonStr);
    if (!gviz.table) throw new Error('gviz: no table in response');

    const cols = gviz.table.cols.map(c => (c.label || c.id || '').trim()).filter(Boolean);
    if (cols.length === 0) throw new Error('gviz: no columns found');

    const rows = (gviz.table.rows || []).map(row => {
      const obj = {};
      (row.c || []).forEach((cell, i) => {
        if (cols[i] !== undefined) {
          obj[cols[i]] = (cell && cell.v !== null && cell.v !== undefined) ? cell.v : '';
        }
      });
      return obj;
    }).filter(row => Object.values(row).some(v => v !== ''));

    COIN_REF_DATA = rows;
    COIN_REF_COLS = cols;
    console.log('[CoinRef] ✅ gviz loaded', rows.length, 'rows. Cols:', cols.join(', '));
    COIN_REF_LOADING = false;
    return COIN_REF_DATA;
  } catch(err) {
    console.warn('[CoinRef] gviz attempt failed:', err.message);
  }

  // ── Strategy 2: Apps Script getReference action ───────────────────────────
  // Requires the GAS to be deployed with v15+. Reads the reference tab
  // server-side — works even when the sheet is private.
  if (GSHEETS_URL) {
    try {
      const url = GSHEETS_URL + '?action=getReference&sheet=' + encodeURIComponent('US Coin Reference');
      const resp = await fetch(url);
      const data = await resp.json();
      if (data && data.ok === false) {
        throw new Error(data.error || 'GAS returned an error');
      }
      if (data && Array.isArray(data.rows)) {
        COIN_REF_DATA = data.rows;
        COIN_REF_COLS = data.cols || (data.rows.length > 0 ? Object.keys(data.rows[0]) : []);
        console.log('[CoinRef] ✅ Apps Script loaded', COIN_REF_DATA.length, 'rows');
        COIN_REF_LOADING = false;
        return COIN_REF_DATA;
      }
      throw new Error('Apps Script returned unexpected format: ' + JSON.stringify(data).slice(0,200));
    } catch(err) {
      console.warn('[CoinRef] Apps Script fallback failed:', err.message);
    }
  }

  // ── Both strategies failed ─────────────────────────────────────────────────
  COIN_REF_LOADING = false;
  return null;
}

/** Normalize a string for loose matching. */
function _refNorm(s) {
  return String(s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
}

/** Score how well a reference row matches a record.
 *  Higher = better match (0 = no match). */
function _refScore(ref, raw) {
  const cols = COIN_REF_COLS || Object.keys(ref);

  // Detect column names flexibly
  const get = (...names) => {
    for (const n of names) {
      const col = cols.find(c => _refNorm(c) === _refNorm(n));
      if (col && ref[col] !== undefined && ref[col] !== '') return String(ref[col]);
    }
    return '';
  };

  const refType   = _refNorm(get('type','name','cointype','coin'));
  const refYear   = _refNorm(get('year','date','series','yeardate'));
  const refDenom  = _refNorm(get('denomination','denom','face','facevalue'));
  const refMint   = _refNorm(get('mintmark','mint','mintmark'));

  const recType   = _refNorm(raw.type || raw.category || '');  // type (US coins) or category (silver coins)
  const recSeries = _refNorm(String(raw.series || '').replace(/\.0$/, '').trim());
  const recDenom  = _refNorm(raw.denomination || '');

  let score = 0;
  // Type match (most important)
  if (refType && recType) {
    if (refType === recType) score += 40;
    else if (refType.includes(recType) || recType.includes(refType)) score += 20;
  }
  // Year / series match
  if (refYear && recSeries) {
    if (refYear === recSeries) score += 30;
    else if (refYear.startsWith(recSeries.slice(0,4)) || recSeries.startsWith(refYear.slice(0,4))) score += 15;
  }
  // Denomination match
  if (refDenom && recDenom) {
    if (refDenom === recDenom) score += 20;
    else if (refDenom.includes(recDenom) || recDenom.includes(refDenom)) score += 10;
  }
  return score;
}

/** Given a record's grade string (e.g. "MS 65", "VF 20"), find the best
 *  matching value column in the reference row. */
function _refValueForGrade(ref, grade) {
  const cols = COIN_REF_COLS || Object.keys(ref);
  const g = _refNorm(grade);
  // Try direct column match
  for (const col of cols) {
    if (_refNorm(col) === g && ref[col] !== '' && ref[col] != null) {
      return parseFloat(String(ref[col]).replace(/[$,]/g,'')) || null;
    }
  }
  // Grade prefix map: try to map "MS 65" → "MS65", "VF 20" → "VF20", etc.
  const prefixes = [g, g.replace(/\s+/g,''), g.slice(0,2), g.slice(0,4)];
  for (const p of prefixes) {
    const col = cols.find(c => _refNorm(c).startsWith(p));
    if (col && ref[col] !== '' && ref[col] != null) {
      return parseFloat(String(ref[col]).replace(/[$,]/g,'')) || null;
    }
  }
  return null;
}

/** Build a diff of what the reference would add/change for a record.
 *  Returns { updates: {field: newVal, ...}, refRow, score }. */
function _buildRefDiff(ref, raw, grade) {
  const cols = COIN_REF_COLS || Object.keys(ref);
  const get = (...names) => {
    for (const n of names) {
      const col = cols.find(c => _refNorm(c) === _refNorm(n));
      if (col && ref[col] !== undefined && String(ref[col]).trim() !== '') return String(ref[col]).trim();
    }
    return null;
  };

  const updates = {};

  // Value from grade
  if (!raw.value || parseFloat(raw.value) === 0) {
    const val = _refValueForGrade(ref, grade || raw.grade || '');
    if (val) updates.value = val;
  }
  // Composition / metal
  if (!raw.composition || raw.composition === '') {
    const v = get('composition','metal','alloy','material');
    if (v) updates.composition = v;
  }
  // Weight
  if (!raw.weight || parseFloat(raw.weight) === 0) {
    const v = get('weight','weightoz','weightg');
    if (v) updates.weight = parseFloat(v) || v;
  }
  // Diameter
  if (!raw.diameter || raw.diameter === '') {
    const v = get('diameter','diametermm','size');
    if (v) updates.diameter = v;
  }
  // Mintage
  if (!raw.mintage || raw.mintage === '') {
    const v = get('mintage','mintagetotal','mintagecount');
    if (v) updates.mintage = v;
  }
  // Design / designer
  if (!raw.designer && !raw.design) {
    const v = get('designer','obversedesigner','artist');
    if (v) updates.designer = v;
  }
  // Notes / features (only if empty)
  if (!raw.features || raw.features === '') {
    const v = get('notes','description','details');
    if (v && v.length < 200) updates.notes = v;
  }

  // Type alignment: all sheets now use "type" column. Also write category for
  // any legacy records that still use the old column name.
  const refTypeVal = get('type','name','cointype','coin');
  if (refTypeVal) {
    if (!raw.type || raw.type === '') {
      updates.type = refTypeVal;
    }
    // Legacy compat: also fill category if the record still has that field empty
    if (raw.category !== undefined && (!raw.category || raw.category === '')) {
      updates.category = refTypeVal;
    }
  }

  return updates;
}

/** Show the lookup modal for a single record. */
async function lookupRecord(item) {
  const id = cn(item.id);
  const btn = document.getElementById('lookup-btn-' + id);
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

  const refData = await loadCoinReference();
  if (btn) { btn.textContent = '🔍'; btn.disabled = false; }

  if (!refData || refData.length === 0) {
    showLookupModal(item, [], 'LOAD_FAILED');
    return;
  }

  const raw = item.raw;
  const scored = refData
    .map(ref => ({ ref, score: _refScore(ref, raw) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 10); // show up to 10 candidates

  if (scored.length === 0) {
    showLookupModal(item, [], 'No matching coin found for:\n\nType: ' + (raw.type || raw.category || '?') + '\nSeries/Year: ' + (raw.series || '?') + '\nDenomination: ' + (raw.denomination || '?') + '\n\nCheck that the coin type and year are filled in.');
    return;
  }

  showLookupModal(item, scored, null);
}

/** Bulk lookup for all visible US coin records. */
async function bulkLookupUSCoins() {
  const btn = document.getElementById('bulk-lookup-btn');
  if (btn) { btn.textContent = '⏳ Loading reference…'; btn.disabled = true; }

  const refData = await loadCoinReference();
  if (btn) { btn.textContent = '🔍 Lookup US Coins'; btn.disabled = false; }

  if (!refData || refData.length === 0) {
    alert('Could not load US Coin Reference sheet.\n\nThe app tried reading via Google\'s gviz endpoint (needs you logged into Google in this browser) and your Apps Script.\n\nTry clicking "Lookup US Coins" again — the first attempt sometimes fails. If it keeps failing, check the console (F12) for details.');
    return;
  }

  const usSheets = ['gradedUS', 'rawUS'];
  let items = ALL_ITEMS.filter(i => usSheets.includes(i.sheet));

  // Apply current filters
  if (ST.search) {
    const q = ST.search.toLowerCase();
    items = items.filter(i => (JSON.stringify(i.raw) || '').toLowerCase().includes(q));
  }

  if (items.length === 0) { alert('No US coin records visible to look up.'); return; }

  let updated = 0, skipped = 0, errors = 0;
  const updateLog = [];

  for (const item of items) {
    const raw = item.raw;
    const scored = refData.map((ref, i) => ({ ref, score: _refScore(ref, raw) }))
                          .filter(x => x.score >= 30)   // require decent match
                          .sort((a, b) => b.score - a.score);
    if (scored.length === 0) { skipped++; continue; }

    const best = scored[0];
    const updates = _buildRefDiff(best.ref, raw, raw.grade || '');
    if (Object.keys(updates).length === 0) { skipped++; continue; }

    // Apply locally
    const arr = D[item.sheet];
    const idx = arr.findIndex(r => String(r.id) === String(item.id));
    if (idx < 0) { errors++; continue; }
    Object.assign(arr[idx], updates);
    Object.assign(raw, updates);
    updateLog.push({ id: cn(item.id), sheet: item.sheet, fields: Object.keys(updates), updates });
    updated++;
  }

  if (updated > 0) {
    buildFlat();
    // Sync to Sheets in background
    if (GSHEETS_URL) {
      for (const { id, sheet, updates } of updateLog) {
        updateRecordInSheets(sheet, id, updates).catch(() => {});
      }
    }
    if (ST.view === 'inv') renderInv();
  }

  alert(`Bulk Lookup Complete\n\n✅ Updated: ${updated} records\n⏭ Already complete / no match: ${skipped}\n❌ Errors: ${errors}\n\n${GSHEETS_URL ? 'Syncing changes to Google Sheets…' : 'Connect Google Sheets to sync.'}`);
}

// ── US Coin Reference Lookup — redesigned modal ──────────────────────────────

/** Map a reference sheet column name → record field key. Returns null if not mappable. */
function _refColToRecordField(col) {
  const n = _refNorm(col);
  if (['type','name','cointype','coin','coinname'].some(k => n === k)) return 'type';
  if (['year','date','yeardate'].some(k => n === k)) return 'series';
  if (n === 'series' && !n.includes('type')) return 'series';
  if (n.startsWith('mintmark') || n === 'mint') return 'mint';
  if (n === 'denomination' || n === 'denom' || n === 'face' || n === 'facevalue') return 'denomination';
  if (n === 'country') return 'country';
  if (['composition','metal','alloy','material'].some(k => n === k || n.startsWith(k))) return 'composition';
  if (n === 'weight' || n === 'weightoz' || n === 'weightinoz' || n === 'troyoz') return 'weight';
  if (n.startsWith('weightg') || n === 'grams' || n === 'gram') return 'weightG';
  if (n === 'diameter' || n.startsWith('diam') || n === 'size') return 'diameter';
  if (n === 'mintage' || n.startsWith('mintaget') || n === 'mintagecount') return 'mintage';
  if (n.startsWith('designer') || n === 'artist' || n.startsWith('obversedesign')) return 'designer';
  if (n === 'notes' || n === 'description' || n === 'details' || n === 'info') return 'features';
  if (n === 'silvercontent' || n === 'purity' || n === 'fineness' || n === 'silverfineness') return 'silverContent';
  return null;
}

/** Returns true if the column looks like a grade-value column (MS65, VF20, PR70 etc.) */
function _isGradeColumn(col) {
  return /^(ms|vf|xf|ef|au|f12|f15|vg|g4|g6|ag|pr|pf|sp|bu|unc)\s*\d/i.test(col.trim());
}

/** Find the grade-matched value column for a record's grade string. */
function _gradeValueCol(ref, grade) {
  if (!grade) return null;
  const cols = COIN_REF_COLS || Object.keys(ref);
  const g = _refNorm(grade);
  for (const col of cols) {
    if (!_isGradeColumn(col)) continue;
    if (_refNorm(col) === g) return col;
  }
  const prefixes = [g, g.replace(/\s+/g,''), g.slice(0,4), g.slice(0,2)];
  for (const p of prefixes) {
    const col = cols.find(c => _isGradeColumn(c) && _refNorm(c).startsWith(p));
    if (col && ref[col] !== '' && ref[col] != null) return col;
  }
  return null;
}

/** Render candidate selection cards HTML. */
function _lmCandidateCards(scored) {
  const cols = COIN_REF_COLS || (scored.length > 0 ? Object.keys(scored[0].ref) : []);
  return scored.map(({ref, score}, idx) => {
    const get = (...ns) => {
      for (const n of ns) {
        const col = cols.find(c => _refNorm(c) === _refNorm(n));
        if (col && ref[col] !== undefined && String(ref[col]).trim() !== '') return String(ref[col]).trim();
      }
      return '';
    };
    const type  = get('type','name','cointype','coin') || '—';
    const year  = get('year','date','series','yeardate');
    const mint  = get('mintmark','mint');
    const comp  = get('composition','metal','alloy');
    const diam  = get('diameter','diametermm','size');
    const mint_ = get('mintage','mintagetotal');
    const sc    = score >= 70 ? 'var(--green)' : score >= 40 ? 'var(--gold)' : 'var(--muted)';
    const meta  = [comp, diam ? '⌀ '+diam+'mm' : '', mint_ ? 'Mintage: '+mint_ : ''].filter(Boolean).join(' · ');
    return `<div onclick="window._lm_select(${idx})"
      style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .12s"
      onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text)">${e(type)}${year?' · '+e(year):''}${mint?' · '+e(mint):''}</div>
        <span style="font-size:10px;color:${sc};background:${sc}18;border:1px solid ${sc}40;border-radius:3px;padding:2px 8px;flex-shrink:0;margin-left:10px">Score ${score}</span>
      </div>
      ${meta ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">${e(meta)}</div>` : ''}
    </div>`;
  }).join('');
}

/** Render field-checkbox table for a chosen reference row. */
function _lmFieldRows(ref, raw, grade) {
  const cols = COIN_REF_COLS || Object.keys(ref);
  const get  = (...ns) => { for (const n of ns) { const c = cols.find(c => _refNorm(c)===_refNorm(n)); if (c && ref[c]!==undefined && String(ref[c]).trim()!=='') return String(ref[c]).trim(); } return '—'; };
  const refName = get('type','name','cointype','coin');
  const refYear = get('year','date','series');
  const refMint = get('mintmark','mint');

  let html = `<div style="background:var(--bg4);border-radius:6px;padding:10px 14px;margin-bottom:12px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:3px">Selected Reference Record</div>
    <div style="color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:15px">${e(refName)}${refYear!=='—'?' · '+e(refYear):''}${refMint!=='—'?' · '+e(refMint):''}</div>
  </div>
  <div style="display:grid;grid-template-columns:20px 1fr 1fr 1fr;gap:4px 10px;padding:4px 8px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);border-bottom:1px solid var(--border);margin-bottom:2px">
    <span></span><span>Field (Reference Column)</span><span>Current on Record</span><span style="color:var(--green)">Reference Value</span>
  </div>`;

  let rowCount = 0;
  const seenFields = new Set();

  // Grade-matched value row first (special case)
  const gradeCol = _gradeValueCol(ref, grade);
  if (gradeCol) {
    const refValRaw = String(ref[gradeCol]).replace(/[$,]/g,'').trim();
    const numVal    = parseFloat(refValRaw);
    const curVal    = raw.value;
    const isEmpty   = !curVal || parseFloat(curVal) === 0;
    const curDisp   = isEmpty ? '—' : '$'+parseFloat(curVal).toFixed(2);
    const refDisp   = isNaN(numVal) ? refValRaw : '$'+numVal.toFixed(2);
    html += _lmRow('value', isNaN(numVal) ? refValRaw : numVal, 'Value ('+gradeCol+')', curDisp, refDisp, isEmpty);
    seenFields.add('value');
    rowCount++;
  }

  // All other non-grade, non-empty columns
  for (const col of cols) {
    if (_isGradeColumn(col)) continue;
    const rawV = ref[col];
    if (rawV === undefined || rawV === null || String(rawV).trim() === '') continue;
    const refVal = String(rawV).trim();
    const field  = _refColToRecordField(col);
    if (!field) continue;
    if (seenFields.has(field)) continue;
    seenFields.add(field);

    const curVal  = raw[field];
    const isEmpty = curVal == null || curVal === '' || curVal === 0 || curVal === '0';
    const curDisp = isEmpty ? '—' : String(curVal);
    // Display label: prettify the column name
    const label   = col.replace(/_/g,' ');
    html += _lmRow(field, refVal, label, curDisp, refVal, isEmpty);
    rowCount++;
  }

  if (rowCount === 0) {
    html += `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No applicable fields found in this reference row.</div>`;
    return { html, hasRows: false };
  }

  // Select/deselect all footer
  html += `<div style="padding:8px 8px 0;border-top:1px solid var(--border);margin-top:6px">
    <label style="cursor:pointer;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)">
      <input type="checkbox" id="lm-check-all" style="cursor:pointer;accent-color:var(--gold)"
        onchange="document.querySelectorAll('#lookup-modal input[data-lmfield]:not([disabled])').forEach(cb=>cb.checked=this.checked)">
      Select / deselect all
    </label>
  </div>`;

  return { html, hasRows: true };
}

/** Single field row with checkbox. */
function _lmRow(field, value, label, curDisp, refDisp, preCheck) {
  const uid  = 'lmf-' + field;
  const vStr = String(value).replace(/"/g,'&quot;');
  const chk  = preCheck ? 'checked' : '';
  const bg   = preCheck ? '' : 'opacity:.7';
  return `<div style="display:grid;grid-template-columns:20px 1fr 1fr 1fr;gap:4px 10px;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;${bg}">
    <input type="checkbox" id="${uid}" data-lmfield="${e(field)}" data-lmvalue="${vStr}" ${chk} style="cursor:pointer;width:14px;height:14px;accent-color:var(--gold)">
    <label for="${uid}" style="font-size:12px;cursor:pointer;color:var(--text);line-height:1.3">${e(label)}</label>
    <span style="font-size:12px;color:var(--dim)">${e(curDisp)}</span>
    <span style="font-size:12px;color:var(--green);font-weight:500">${e(refDisp)}</span>
  </div>`;
}

/** Main lookup modal — two phases: candidate selection → field checkboxes. */
function showLookupModal(item, scored, errorMsg) {
  const existing = document.getElementById('lookup-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'lookup-modal';
  modal.className = 'ref-modal';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  document.body.appendChild(modal);

  // Phase state
  let phase = errorMsg ? 'error' : (scored.length === 1 ? 'fields' : 'candidates');
  let selIdx = 0;

  // Global handlers (needed for onclick= in innerHTML)
  window._lm_select = (idx) => { selIdx = idx; phase = 'fields'; _lmRender(); };
  window._lm_back   = ()    => { phase = 'candidates'; _lmRender(); };
  window._lm_apply  = ()    => {
    const checks = [...modal.querySelectorAll('input[data-lmfield]:checked')];
    if (!checks.length) { alert('Check at least one field to apply.'); return; }
    const updates = {};
    checks.forEach(cb => {
      const field = cb.dataset.lmfield;
      const val   = cb.dataset.lmvalue;
      const num   = parseFloat(val);
      // numeric fields
      updates[field] = ['value','weight','weightG','silverContent','mintage'].includes(field) && !isNaN(num) ? num : val;
    });
    modal.remove();
    _lmApply(item, updates);
  };
  window._lm_toggleAll = (chk) => {
    modal.querySelectorAll('input[data-lmfield]').forEach(cb => cb.checked = chk);
  };

  function _lmRender() {
    let title    = 'Reference Lookup — #' + cn(item.id);
    let subtitle = SHEET_MAP[item.sheet]?.label || item.sheet;
    let body     = '';
    let footer   = '';

    if (phase === 'error') {
      const isLoad = errorMsg === 'LOAD_FAILED';
      const msg    = isLoad
        ? '<b>Could not load the US Coin Reference sheet.</b><br><br>Make sure your Apps Script is deployed with the <code>getReference</code> action and try again.'
        : errorMsg.replace(/\n/g,'<br>');
      body   = `<div style="background:rgba(192,80,74,.08);border:1px solid rgba(192,80,74,.25);border-radius:6px;padding:14px 16px;font-size:13px;color:var(--text);line-height:1.7">${msg}</div>`;
      footer = `<button class="bg" onclick="document.getElementById('lookup-modal').remove()">Close</button>`;

    } else if (phase === 'candidates') {
      subtitle = scored.length + ' possible match' + (scored.length !== 1 ? 'es' : '') + ' found — click the correct one';
      body     = _lmCandidateCards(scored);
      footer   = `<button class="bg" onclick="document.getElementById('lookup-modal').remove()">Cancel</button>`;

    } else { // fields
      const {ref, score} = scored[selIdx];
      const raw = item.raw;
      const {html, hasRows} = _lmFieldRows(ref, raw, raw.grade || '');
      title    = 'Select Fields to Apply — #' + cn(item.id);
      subtitle = scored.length > 1
        ? 'Match ' + (selIdx+1) + ' of ' + scored.length + ' &nbsp;·&nbsp; score ' + score
          + ' &nbsp;<span onclick="window._lm_back()" style="cursor:pointer;text-decoration:underline;color:var(--gold);margin-left:4px">← change selection</span>'
        : subtitle + ' &nbsp;·&nbsp; score ' + score;
      body   = html;
      footer = (scored.length > 1 ? `<button class="bg" onclick="window._lm_back()">← Back</button>` : '')
        + `<button class="bg" onclick="document.getElementById('lookup-modal').remove()">Cancel</button>`
        + (hasRows ? `<button class="bp" onclick="window._lm_apply()">Apply Selected Fields</button>` : '');
    }

    modal.innerHTML = `
      <div class="ref-modal-box" style="width:min(700px,96vw);max-height:90vh">
        <div class="ref-modal-head">
          <div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600">${title}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${subtitle}</div>
          </div>
          <button class="rb" onclick="document.getElementById('lookup-modal').remove()" style="font-size:18px">✕</button>
        </div>
        <div class="ref-modal-body" style="overflow-y:auto;max-height:calc(90vh - 130px)">${body}</div>
        <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
          ${footer}
        </div>
      </div>`;
  }

  _lmRender();
}

/** Apply selected field updates to the record. */
async function _lmApply(item, updates) {
  const arr = D[item.sheet];
  if (!arr) return;
  const idx = arr.findIndex(r => String(r.id) === String(item.id));
  if (idx < 0) return;

  Object.assign(arr[idx], updates);
  Object.assign(item.raw, updates);
  buildFlat();
  if (ST.view === 'inv') renderInv();
  if (ST.selItem === item) showDetail(item);

  const n = Object.keys(updates).length;
  if (GSHEETS_URL) {
    try {
      await updateRecordInSheets(item.sheet, cn(item.id), updates);
      alert('✅ Record #' + cn(item.id) + ' — ' + n + ' field' + (n!==1?'s':'') + ' applied and saved to Google Sheets!');
    } catch(ex) {
      alert('Updated locally — Google Sheets sync failed: ' + ex.message);
    }
  } else {
    alert('✅ Record #' + cn(item.id) + ' — ' + n + ' field' + (n!==1?'s':'') + ' applied! Connect Google Sheets to sync.');
  }
}

// Keep old name as alias so any stale HTML onclick references don't break
async function applyLookupUpdates(sheetKey, id) {

  if (!modal || !modal._pendingUpdates) { modal && modal.remove(); return; }
  await _lmApply(modal._pendingItem, modal._pendingUpdates);
}

let labelsPrinted = new Set(JSON.parse(localStorage.getItem('cv_labels_printed')||'[]'));
function saveLabelsPrinted(){ localStorage.setItem('cv_labels_printed',JSON.stringify([...labelsPrinted])); }


// ── XLSX library lazy loader ─────────────────────────────────────────────────
async function loadXLSX() {
  if (typeof XLSX !== 'undefined') return true;
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    script.onload = () => resolve(true);
    script.onerror = () => reject(new Error('Failed to load XLSX library'));
    document.head.appendChild(script);
  });
}

// ── Export label queue to Nimbot-compatible XLSX file ─────────────────────────
async function exportLabelsNimbot(){
  if (typeof XLSX === 'undefined') {
    try { await loadXLSX(); }
    catch(e) {
      alert('Could not load XLSX library. Check your internet connection.');
      return;
    }
  }
  // Gather all pending labels from in-app sources
  const newRec      = (NEW_RECORDS || []).filter(r => !labelsPrinted.has(String(r.id)));
  const manualKeys  = [...(MANUAL_LABELS || [])];

  const rows = [];
  // Header row — includes Source Sheet for label printing
  rows.push(['Record #','Series','Grade','Cost','Serial Number','Denomination','Source Sheet']);

  sheetLabels.forEach(l => rows.push([  // sheetLabels is always [] — kept for safety
    cn(l.id),
    cn(l.series||''),
    l.grade||'',
    l.cost!=null?l.cost:'',
    l.serial||'',
    cn(l.denomination||''),
    l.sourceSheet||''
  ]));
  // newRec rows:
  newRec.forEach(r => rows.push([
    cn(r.id),
    cn(r.series||r.year||''),
    r.grade||'',
    r.cost!=null?r.cost:'',
    r.serial||'',
    cn(r.denomination||''),
    SHEET_LABELS[r.sheet] || r.sheet || ''
  ]));
  manualKeys.forEach(key => {
    const [sheet, id] = key.split('|');
    const item = ALL_ITEMS.find(i => i.sheet===sheet && cn(i.id)===id);
    if (!item) return;
    const r = item.raw || {};
    rows.push([
      cn(item.id),
      cn(r.series||r.year||''),
      r.grade||'',
      r.cost!=null?r.cost:'',
      r.serial||'',
      cn(r.denomination||''),
      SHEET_MAP[sheet] ? SHEET_MAP[sheet].label : sheet
    ]);
  });

  if (rows.length <= 1) { alert('No labels to export.'); return; }

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:10},{wch:25},{wch:18},{wch:10},{wch:18},{wch:14},{wch:22}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Labels');

  const date = new Date().toISOString().substring(0,10);
  XLSX.writeFile(wb, 'Nimbot_Labels_' + date + '.xlsx');
}

async function markAllPrinted() {
  // Build the current pending queue
  const newRecLabels = (NEW_RECORDS || []).filter(r => !labelsPrinted.has(String(r.id)));
  const manualLabels = [...(MANUAL_LABELS || [])];
  
  const totalPending = newRecLabels.length + manualLabels.length;
  
  if (totalPending === 0) {
    alert('No pending labels to mark as printed');
    return;
  }
  
  if (!confirm('Mark all ' + totalPending + ' pending label(s) as printed?')) return;
  
  // Mark new records as printed
  newRecLabels.forEach(r => labelsPrinted.add(String(r.id)));
  // For manual labels (keyed as "sheet|id"), extract the ID part
  manualLabels.forEach(key => {
    const id = key.split('|')[1];
    if (id) labelsPrinted.add(id);
  });
  
  // Clear manual labels queue
  MANUAL_LABELS = new Set();
  saveManualLabels();
  
  // Persist labelsPrinted
  saveLabelsPrinted();
  
  renderLabels();
  updateBadges();
}

function renderLabels(){
  // Labels come from two in-app sources:
  //   NEW_RECORDS — records added locally but not yet printed
  //   MANUAL_LABELS — records manually flagged for reprint from inventory
  const newRecLabels = (NEW_RECORDS || [])
    .filter(r => !labelsPrinted.has(String(r.id)))
    .map(r => ({
      source: 'new', id: cn(r.id), raw_id: String(r.id),
      sheet: SHEET_LABELS[r.sheet] || r.sheet,
      sheetKey: r.sheet,
      series: cn(r.series || r.year || ''),
      grade: r.grade || '',
      cost: r.cost, serial: r.serial || '',
      denomination: cn(r.denomination || '')
    }));

  const manualLabels = [...(MANUAL_LABELS || [])].map(key => {
    const [sheet, id] = key.split('|');
    const item = ALL_ITEMS.find(i => i.sheet === sheet && cn(i.id) === id);
    if (!item) return null;
    const r = item.raw || {};
    return {
      source: 'manual', id: cn(item.id), raw_id: String(item.id),
      sheet: SHEET_MAP[sheet] ? SHEET_MAP[sheet].label : sheet,
      sheetKey: sheet,
      series: cn(r.series || r.year || ''),
      grade: r.grade || '',
      cost: r.cost, serial: r.serial || '',
      denomination: cn(r.denomination || '')
    };
  }).filter(Boolean);

  const all = [...newRecLabels, ...manualLabels];
  const pendingCount = all.length;

  const $ = document.getElementById('content');

  if (pendingCount === 0) {
    $.innerHTML = '<div class="vh"><div><div class="vt">Labels Queue</div><div class="vsub">Items awaiting printed labels</div></div></div>'
      + '<div class="empty"><div class="empty-i">&#10003;</div><div class="empty-t">All labels up to date</div><div class="empty-s">No items currently awaiting labels. Toggle the + button on any inventory row to queue it for reprint.</div></div>';
    document.getElementById('b-labels').textContent = 0;
    return;
  }

  let html = '<div class="vh">'
    + '<div><div class="vt">Labels Queue <span style="font-size:15px;opacity:.35;font-weight:400">' + pendingCount + ' pending</span></div>'
    + '<div class="vsub">' + newRecLabels.length + ' new records · ' + manualLabels.length + ' reprints &mdash; <em>click any row to view/edit; click &times; to remove</em></div></div>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="bp" onclick="exportLabelsNimbot()">&#8595; Export Nimbot XLSX</button>'
    + '<button class="bg" onclick="markAllPrinted()">&#10003; Mark All Printed</button>'
    + '</div></div>';

  // Nimbot format preview (6 columns) + Source + Remove
  html += '<div class="stt">Nimbot Export Preview <span style="font-size:11px;text-transform:none;letter-spacing:0;color:var(--dim);font-style:italic">— format: Record # · Series · Grade · Cost · Serial · Denomination</span></div>';
  html += '<div class="tw"><table>'
    + '<thead><tr>'
    + '<th style="width:80px">Record #</th>'
    + '<th>Series</th>'
    + '<th>Grade</th>'
    + '<th class="r" style="width:80px">Cost</th>'
    + '<th>Serial #</th>'
    + '<th>Denomination</th>'
    + '<th>Source Sheet</th>'
    + '<th style="width:80px">Tag</th>'
    + '<th style="width:50px;text-align:center" title="Remove from queue">Remove</th>'
    + '</tr></thead><tbody>';

  html += all.map(function(l){
    const tag = l.source==='manual' ? '<span class="pill" style="background:rgba(201,168,76,.18);color:var(--gold);border-color:rgba(201,168,76,.4);font-size:9px">Reprint</span>'

             :                       '<span class="pill" style="background:rgba(80,120,180,.18);color:#5a8ad8;border-color:rgba(80,120,180,.4);font-size:9px">Sheet</span>';
    // Build click handler that opens the record's detail panel
    const clickAttr = 'onclick="openLabelRecord(\'' + l.raw_id.replace(/'/g, "\\'") + '\',\'' + l.source + '\',\'' + (l.sheetKey||'').replace(/'/g, "\\'") + '\')"';
    const removeAttr = 'onclick="event.stopPropagation();removeFromLabelQueue(\'' + l.raw_id.replace(/'/g, "\\'") + '\',\'' + l.source + '\',\'' + (l.sheetKey||'').replace(/'/g, "\\'") + '\')"';
    return '<tr style="cursor:pointer" ' + clickAttr + '>'
      + '<td><code style="color:var(--gold);font-size:11px">' + e(l.id) + '</code></td>'
      + '<td style="font-size:12px">' + e(l.series || '—') + '</td>'
      + '<td style="font-size:12px">' + e(l.grade || '—') + '</td>'
      + '<td class="r mono">' + (l.cost != null ? fmt$(l.cost) : '—') + '</td>'
      + '<td style="font-size:11px;color:var(--muted)">' + e(l.serial || '—') + '</td>'
      + '<td style="font-size:12px">' + e(l.denomination || '—') + '</td>'
      + '<td style="font-size:11px;color:var(--muted)">' + e(l.sheet || '—') + '</td>'
      + '<td>' + tag + '</td>'
      + '<td style="text-align:center"><button class="rm-lbl-btn" ' + removeAttr + ' title="Remove from label queue" style="background:transparent;border:1px solid var(--border);color:var(--red);width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:14px;line-height:1;padding:0">&times;</button></td>'
      + '</tr>';
  }).join('');
  html += '</tbody></table></div>';

  $.innerHTML = html;
  document.getElementById('b-labels').textContent = pendingCount;
}

// Click on a label row -> find the record in ALL_ITEMS and open detail panel
function openLabelRecord(id, source, sheetKey) {
  const cleanId = cn(id);
  let item = null;
  if (sheetKey) {
    item = ALL_ITEMS.find(i => i.sheet === sheetKey && cn(i.id) === cleanId);
  }
  if (!item) {
    // Fall back to any sheet match (sheet labels don't always know their sheet key)
    item = ALL_ITEMS.find(i => cn(i.id) === cleanId);
  }
  if (!item) {
    alert('Record #' + cleanId + ' not found in inventory.\n\nThis may be a label entry from a record that was deleted from the spreadsheet.');
    return;
  }
  showDetail(item);
}

// Remove a label from the queue (without printing)
function removeFromLabelQueue(id, source, sheetKey) {
  const cleanId = cn(id);
  if (!confirm('Remove record #' + cleanId + ' from the label queue?\n\nThis does not delete the record itself.')) return;

  if (source === 'manual' && sheetKey) {
    MANUAL_LABELS.delete(sheetKey + '|' + cleanId);
    saveManualLabels();
  } else {
    // 'new' source: mark as printed so it's filtered out of NEW_RECORDS display
    labelsPrinted.add(String(id));
    saveLabelsPrinted();
  }
  updateBadges();
  renderLabels();
}

function renderBreakdown() {
  const T = computeTotals();
  
  // Build category-level stats
  const categories = {};
  ALL_ITEMS.forEach(item => {
    const sheet = item.sheet;
    if (!categories[sheet]) {
      categories[sheet] = { 
        count: 0, 
        oz: 0, 
        cost: 0, 
        value: 0,
        items: [] 
      };
    }
    categories[sheet].count++;
    categories[sheet].oz   += item.oz   || 0;
    categories[sheet].cost  += item.cost || 0;
    // Use live melt for bullion/silver coins; fall back to numismatic value or cost for everything else
    const _melt = liveMelt(item);
    const _num  = parseFloat(item.value) || 0;
    const _cost = parseFloat(item.cost)  || 0;
    categories[sheet].value += Math.max(_num, _melt, _cost);
    categories[sheet].items.push(item);
  });
  
  // Sort by count descending
  const sorted = Object.entries(categories).sort((a,b) => b[1].count - a[1].count);
  
  // Category labels
  const labels = {
    gold:'Gold Bullion', silver:'Silver Bullion', copper:'Copper Bullion', 
    platinum:'Platinum', palladium:'Palladium',
    mintSets:'Mint Sets', gradedSilver:'Graded Silver Coins', rawSilver:'Raw Silver Coins',
    gradedUS:'Graded US Coins', rawUS:'Raw US Coins', 
    gradedForeign:'Graded Foreign Coins', rawForeign:'Raw Foreign Coins',
    usNotes:'US Notes', confederate:'Confederate Notes', obsolete:'Obsolete Notes', 
    foreignNotes:'Foreign Notes', fractional:'Fractional Currency',
    ancient:'Ancient Coins', other:'Other'
  };
  
  let h = '<div class="vh">';
  h += '<div><div class="vt">Category Breakdown</div>';
  h += '<div class="vsub">Detailed inventory grouped by category and series</div></div>';
  h += '<div style="display:flex;gap:10px;flex-wrap:wrap">';
  h += '<button class="bp" onclick="exportCSV()">↓ Export CSV</button>';
  h += '</div></div>';
  
  // Summary cards
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px">';
  sorted.forEach(([cat, stats]) => {
    const pct = (stats.count / T.totCount * 100).toFixed(1);
    h += '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:14px;cursor:pointer" onclick="scrollToCat(\'' + cat + '\')">';
    h += '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:4px">' + e(labels[cat] || cat) + '</div>';
    h += '<div style="font-size:24px;font-family:Cormorant Garamond,serif;color:var(--text);margin-bottom:4px">' + stats.count.toLocaleString() + '</div>';
    h += '<div style="font-size:11px;color:var(--muted)">' + pct + '% of collection</div>';
    h += '</div>';
  });
  h += '</div>';
  
  // Detailed breakdown by category → series
  sorted.forEach(([cat, stats]) => {
    h += '<div id="cat-' + cat + '" style="margin-bottom:32px">';
    h += '<div class="stt" style="margin-bottom:10px">' + e(labels[cat] || cat) + ' (' + stats.count + ' records)</div>';
    
    // Group by series within this category
    const bySeries = {};
    stats.items.forEach(item => {
      const ser = item.series || '(No Series)';
      if (!bySeries[ser]) bySeries[ser] = [];
      bySeries[ser].push(item);
    });
    
    const seriesSorted = Object.entries(bySeries).sort((a,b) => b[1].length - a[1].length);
    
    h += '<table style="margin-bottom:12px">';
    h += '<thead><tr><th>Series / Year</th><th class="r">Count</th><th class="r">Avg Cost</th><th class="r">Total Value</th></tr></thead>';
    h += '<tbody>';
    seriesSorted.forEach(([ser, items]) => {
      const avgCost = items.reduce((s,i) => s + (i.cost||0), 0) / items.length;
      const totVal = items.reduce((s,i) => s + Math.max(parseFloat(i.value)||0, liveMelt(i), parseFloat(i.cost)||0), 0);
      h += '<tr>';
      h += '<td>' + e(ser) + '</td>';
      h += '<td class="r mono">' + items.length + '</td>';
      h += '<td class="r mono">' + (avgCost > 0 ? fmt$(avgCost) : '—') + '</td>';
      h += '<td class="r mono" style="color:var(--gold)">' + fmt$(totVal) + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
    h += '</div>';
  });
  
  document.getElementById('content').innerHTML = h;
}

function scrollToCat(cat) {
  const el = document.getElementById('cat-' + cat);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderDups(){
  // Group ALL items by their NORMALIZED record number so that "1", "0001",
  // "001", "1.0" are all treated as the same record number.
  // normId() strips trailing .0 AND leading zeros from purely-numeric IDs.

  const groups = {};
  ALL_ITEMS.forEach(item => {
    const nid = normId(item.id);
    if (!nid) return;
    if (!groups[nid]) groups[nid] = [];
    groups[nid].push(item);
  });

  const dups = Object.entries(groups)
    .filter(([k, g]) => g.length > 1)
    .sort((a, b) => {
      const an = parseInt(a[0]), bn = parseInt(b[0]);
      if (!isNaN(an) && !isNaN(bn)) return an - bn;
      return a[0].localeCompare(b[0]);
    });

  const total        = dups.length;
  const totalRecords = dups.reduce((s, [, g]) => s + g.length, 0);

  const badge = document.getElementById('b-dups');
  if (badge) {
    badge.textContent = total;
    badge.style.display = total > 0 ? '' : 'none';
  }

  const $ = document.getElementById('content');

  if (total === 0) {
    $.innerHTML = '<div class="vh"><div><div class="vt">Duplicate Record Numbers</div>'
      + '<div class="vsub">Record numbers that appear more than once anywhere in your collection</div></div></div>'
      + '<div class="empty"><div class="empty-i">&#10003;</div><div class="empty-t">No duplicate record numbers</div>'
      + '<div class="empty-s">Every record number is unique across the entire collection</div></div>';
    return;
  }

  let body = '<div class="vh"><div><div class="vt">Duplicate Record Numbers</div>'
    + '<div class="vsub"><strong>' + total + '</strong> duplicate group(s) &mdash; <strong>' + totalRecords
    + '</strong> records share a number. Use <strong>Change #</strong> on any row to assign a new unique record number.</div></div></div>';

  body += '<div class="fb"><div class="sw">'
    + '<input type="text" id="dup-search" placeholder="Filter by record number…" oninput="filterDupsBySearch(this.value)" style="padding-left:32px">'
    + '<span class="si">⌕</span>'
    + '</div></div>';

  body += '<div id="dup-list">';
  body += dups.map(function(entry){
    const nid = entry[0];
    const g   = entry[1];

    let table = '<table><thead><tr>'
      + '<th style="width:100px">Record #</th>'
      + '<th style="width:130px">Category</th>'
      + '<th>Description</th>'
      + '<th class="r" style="width:80px">Cost</th>'
      + '<th class="r" style="width:80px">Value</th>'
      + '<th style="width:100px;text-align:center">Action</th>'
      + '</tr></thead><tbody>';

    table += g.map(function(i, rowIdx){
      const sm        = SHEET_MAP[i.sheet];
      const gc        = (sm && GC[sm.group]) || '#707070';
      const sheetLbl  = sm ? sm.label : i.sheet;
      const iidx      = ALL_ITEMS.indexOf(i);
      // Encode item reference safely for onclick
      const safeSheet = i.sheet.replace(/'/g, "\\'");
      const safeId    = String(i.id).replace(/'/g, "\\'");
      return '<tr data-idx="' + iidx + '" style="vertical-align:middle">'
        + '<td><code style="color:var(--gold);background:var(--bg2);padding:2px 7px;border-radius:3px;font-size:11px">'
            + e(cn(i.id)) + '</code></td>'
        + '<td><span class="pill" style="background:' + gc + '18;color:' + gc + ';border-color:' + gc + '38;font-size:10px">'
            + e(sheetLbl) + '</span></td>'
        + '<td style="font-size:12px">' + e(i.desc || '—') + '</td>'
        + '<td class="r mono">' + fmt$(i.cost) + '</td>'
        + '<td class="r mono">' + fmt$(i.value) + '</td>'
        + '<td style="text-align:center">'
            + '<button class="bp" style="font-size:10px;padding:3px 9px;white-space:nowrap" '
            + 'onclick="openRenumberModal(\'' + safeSheet + '\',\'' + safeId + '\',\'' + nid + '\')">'
            + '✎ Change #</button>'
        + '</td>'
        + '</tr>';
    }).join('');
    table += '</tbody></table>';

    return '<div class="dg" data-nid="' + nid + '">'
      + '<div class="dgh">'
      + '<strong style="color:var(--text);font-size:14px">Record #' + nid + '</strong>'
      + '<span style="margin-left:8px;font-size:11px;color:var(--dim)">'
          + g.length + ' records share this number</span>'
      + '<button class="bg" style="margin-left:auto;font-size:10px;padding:2px 8px" '
          + 'onclick="openItemDetail(this.closest(\'.dg\').querySelector(\'tr[data-idx]\'))">'
          + 'View first →</button>'
      + '</div>'
      + table + '</div>';
  }).join('');
  body += '</div>';

  $.innerHTML = body;
}

function filterDupsBySearch(q) {
  q = (q || '').trim().toLowerCase();
  document.querySelectorAll('#dup-list .dg').forEach(el => {
    const nid = (el.dataset.nid || '').toLowerCase();
    el.style.display = (!q || nid.includes(q)) ? '' : 'none';
  });
}

// ── Renumber modal — focused dialog just for changing a record number ─────────
function openRenumberModal(sheetKey, rawId, groupNid) {
  const ex = document.getElementById('renumber-modal');
  if (ex) ex.remove();

  // Find the item in D so we can show description
  const arr = D[sheetKey];
  let recDesc = '';
  if (arr) {
    const rec = arr.find(r => normId(r.id) === normId(rawId));
    if (rec) {
      recDesc = rec.description || rec.desc || rec.series || rec.type || rec.noteType || rec.composition || '';
    }
  }

  // Suggest next available number above current max
  const usedNids = new Set(ALL_ITEMS.map(i => normId(i.id)).filter(Boolean));
  let suggest = parseInt(groupNid) || 0;
  do { suggest++; } while (usedNids.has(String(suggest)));

  const sm       = SHEET_MAP[sheetKey];
  const catLabel = sm ? sm.label : sheetKey;

  const modal = document.createElement('div');
  modal.id = 'renumber-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:1100;display:flex;align-items:center;justify-content:center';
  modal.innerHTML =
    '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:420px;padding:26px;box-shadow:0 8px 32px rgba(0,0,0,.5)">'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">'
    +   '<div>'
    +     '<div style="font-family:Cormorant Garamond,serif;font-size:20px;color:var(--gold)">Change Record Number</div>'
    +     '<div style="font-size:11px;color:var(--dim);margin-top:4px">' + e(catLabel) + (recDesc ? ' — ' + e(String(recDesc).substring(0, 50)) : '') + '</div>'
    +   '</div>'
    +   '<button onclick="document.getElementById(\'renumber-modal\').remove()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1">&times;</button>'
    + '</div>'
    + '<div style="margin-bottom:14px">'
    +   '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:5px">Current Record #</div>'
    +   '<div style="font-size:22px;font-family:monospace;color:var(--text);background:var(--bg2);padding:8px 12px;border-radius:5px;border:1px solid var(--border)">' + e(cn(rawId)) + '</div>'
    + '</div>'
    + '<div style="margin-bottom:20px">'
    +   '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:5px">New Record # <span style="color:var(--muted);font-style:italic;text-transform:none">(suggested: ' + suggest + ')</span></div>'
    +   '<input id="renumber-new-id" type="text" value="' + suggest + '" '
    +     'style="width:100%;background:var(--bg2);border:1px solid var(--gold);color:var(--text);padding:9px 12px;border-radius:5px;font-size:18px;font-family:monospace;box-sizing:border-box" '
    +     'placeholder="Enter new record number…" '
    +     'onkeydown="if(event.key===\'Enter\')saveRenumber(\'' + sheetKey.replace(/'/g,"\\'") + '\',\'' + String(rawId).replace(/'/g,"\\'") + '\')">'
    +   '<div id="renumber-warn" style="font-size:11px;color:#e07070;margin-top:5px;min-height:16px"></div>'
    + '</div>'
    + '<div style="display:flex;gap:8px">'
    +   '<button class="bp" style="flex:1;padding:10px" onclick="saveRenumber(\'' + sheetKey.replace(/'/g,"\\'") + '\',\'' + String(rawId).replace(/'/g,"\\'") + '\')">Save New Number</button>'
    +   '<button class="bg" style="flex:1;padding:10px" onclick="document.getElementById(\'renumber-modal\').remove()">Cancel</button>'
    + '</div>'
    + '</div>';

  document.body.appendChild(modal);

  // Wire up live duplicate-check warning
  const inp = modal.querySelector('#renumber-new-id');
  const warn = modal.querySelector('#renumber-warn');
  inp.focus(); inp.select();
  inp.oninput = function() {
    const v = normId(inp.value.trim());
    if (!v) { warn.textContent = ''; return; }
    if (v === groupNid) {
      warn.textContent = '⚠ That is the same as the current number.';
    } else if (usedNids.has(v) && v !== groupNid) {
      warn.textContent = '⚠ Record #' + v + ' already exists — saving will create another duplicate.';
    } else {
      warn.textContent = '';
    }
  };
}

function saveRenumber(sheetKey, rawId) {
  const modal  = document.getElementById('renumber-modal');
  if (!modal) return;
  const inp    = modal.querySelector('#renumber-new-id');
  const newVal = inp ? inp.value.trim() : '';
  if (!newVal) { alert('Please enter a new record number.'); return; }

  const oldNid = normId(rawId);
  const newNid = normId(newVal);

  if (oldNid === newNid) {
    if (!confirm('The new number normalizes to the same value as the current number. Save anyway?')) return;
  }

  // Find the record using normalized ID matching (handles "1", "0001", "001", "1.0" all the same)
  const arr = D[sheetKey];
  if (!arr) { alert('Category not found: ' + sheetKey); return; }

  const recIdx = arr.findIndex(r => normId(r.id) === oldNid);
  if (recIdx < 0) {
    alert('Could not find record #' + rawId + ' in ' + sheetKey + '.\nTry refreshing from Google Sheets.');
    return;
  }

  const original = arr[recIdx];
  const oldId    = original.id;   // preserve exact stored original for Sheets lookup

  // Apply new id locally
  arr[recIdx].id = newVal;

  // Update PENDING_EDITS — remove old key, write new key with new id
  const oldKey = sheetKey + '|' + cn(String(oldId));
  const newKey = sheetKey + '|' + cn(newVal);
  const existing = PENDING_EDITS[oldKey] || {};
  delete PENDING_EDITS[oldKey];
  PENDING_EDITS[newKey] = Object.assign({}, existing, { id: newVal });
  savePendingEdits();

  // Also update any matching NEW_RECORDS
  NEW_RECORDS = NEW_RECORDS.map(nr =>
    (nr.sheet === sheetKey && normId(nr.id) === oldNid) ? { ...nr, id: newVal } : nr
  );
  saveNR();

  buildFlat();
  updateBadges();
  refreshSidebarTotal();
  modal.remove();

  // Re-render dups so user sees remaining groups
  renderDups();

  const summary = '✓ Record #' + cn(String(oldId)) + ' → #' + cn(newVal) + '\nCategory: ' + (SHEET_MAP[sheetKey] ? SHEET_MAP[sheetKey].label : sheetKey);

  if (GSHEETS_URL) {
    alert(summary + '\n\nSyncing to Google Sheets…');
    updateRecordInSheets(sheetKey, String(oldId), { id: newVal }).then(syncOk => {
      if (syncOk) {
        delete PENDING_EDITS[newKey];
        savePendingEdits();
        console.log('[Sync OK] Renumber #' + cn(String(oldId)) + ' → #' + cn(newVal));
      } else {
        console.warn('[Sync FAILED] Renumber kept in PENDING_EDITS for retry.');
        updateSyncBanner('error', 'Renumber saved locally — Sheets sync failed. Check Apps Script deployment.');
      }
    });
  } else {
    alert(summary + '\n\nNote: Google Sheets not connected. Change saved in this browser only.');
  }
}



function exportDashCSV() {
  const T = computeTotals();
  // Recompute the same data renderDash uses
  const groups = {
    'Precious Metals': ['gold','silver','copper','platinum','palladium'],
    'Coins':           ['gradedSilver','rawSilver','gradedUS','rawUS','gradedForeign','rawForeign','ancient'],
    'Currency & Notes':['usNotes','confederate','obsolete','foreignNotes','fractional'],
    'Sets':            ['mintSets'],
    'Other':           ['other'],
  };
  const gstats = {};
  for (const [g, keys] of Object.entries(groups)) {
    gstats[g] = {cost:0, value:0, count:0, oz:0};
    for (const k of keys) {
      const st = PRECOMPUTED[k] || {};
      gstats[g].cost  += st.cost  || 0;
      gstats[g].value += st.value || 0;
      gstats[g].count += st.count || 0;
      gstats[g].oz    += st.oz    || 0;
    }
  }
  const totVal   = Object.values(gstats).reduce((s,g)=>s+g.value, 0);
  const totCost  = Object.values(gstats).reduce((s,g)=>s+g.cost, 0);
  const totCount = Object.values(gstats).reduce((s,g)=>s+g.count, 0);
  const gain     = totVal - totCost;
  const gainPct  = totCost > 0 ? ((gain/totCost)*100).toFixed(2) : '0';

  // Metals melt computations (use live spot prices if available)
  const sp         = SPOTS || {};
  const silverOz   = SILVER_TOT_OZ;
  const goldOz     = GOLD_PURE_OZ;
  const platOz     = PLAT_OZ;
  const pallOz     = PALL_OZ;
  const copperLb   = COPPER_LB;
  const silverMelt = sp.silver    ? silverOz * sp.silver    : (PRECOMPUTED.silver  && PRECOMPUTED.silver.value)  || 0;
  const goldMelt   = sp.gold      ? goldOz   * sp.gold      : (PRECOMPUTED.gold    && PRECOMPUTED.gold.value)    || 0;
  const platMelt   = sp.platinum  ? platOz   * sp.platinum  : (PRECOMPUTED.platinum&& PRECOMPUTED.platinum.value)|| 0;
  const pallMelt   = sp.palladium ? pallOz   * sp.palladium : (PRECOMPUTED.palladium&&PRECOMPUTED.palladium.value)|| 0;
  const copperMelt = sp.copper    ? copperLb * sp.copper    : (PRECOMPUTED.copper  && PRECOMPUTED.copper.value)  || 0;
  const totMelt    = silverMelt + goldMelt + platMelt + pallMelt + copperMelt;

  // Build CSV — multi-section format with section headers
  const rows = [];
  const dt = new Date();
  rows.push(['Collectibles Vault — Dashboard Snapshot']);
  rows.push(['Exported', dt.toISOString()]);
  rows.push([]);

  rows.push(['SUMMARY STATS']);
  rows.push(['Metric','Value']);
  rows.push(['Total Collection Value', totVal.toFixed(2)]);
  rows.push(['Total Cost Paid',        totCost.toFixed(2)]);
  rows.push(['Unrealized Gain',        gain.toFixed(2)]);
  rows.push(['Gain %',                 gainPct + '%']);
  rows.push(['Precious Metals Melt',   totMelt.toFixed(2)]);
  rows.push(['Total Records',          totCount]);
  rows.push([]);

  rows.push(['PRECIOUS METALS BREAKDOWN']);
  rows.push(['Metal','Total Oz / Lb','Spot Price','Melt Value','Source']);
  rows.push(['Silver — Bullion',           T.silverBulOz.toFixed(4)+' oz', sp.silver  ? '$'+sp.silver.toFixed(2)+'/oz'  : 'spot N/A', (sp.silver?(T.silverBulOz*sp.silver):0).toFixed(2), '182 items']);

function exportCSV(){
  // Mirror renderInv filtering EXACTLY so what's exported = what's on screen
  let items = [...ALL_ITEMS];
  if (ST.search) {
    const q = ST.search.toLowerCase();
    items = items.filter(i => {
      if ((i.id||'').toLowerCase().includes(q)) return true;
      if ((i.desc||'').toLowerCase().includes(q)) return true;
      if ((i.series||'').toLowerCase().includes(q)) return true;
      if ((i.grade||'').toLowerCase().includes(q)) return true;
      const r = i.raw || {};
      const fields = ['category','type','country','denomination','noteType','serial',
                      'composition','gradingAuth','features','state','description',
                      'mint','frNum','sig1','sig2','seriesType'];
      return fields.some(f => f in r && String(r[f]||'').toLowerCase().includes(q));
    });
  }
  if (ST.filterGroup !== 'all') items = items.filter(i => SHEET_MAP[i.sheet].group === ST.filterGroup);
  if (ST.filterSheet !== 'all') items = items.filter(i => i.sheet === ST.filterSheet);

  // Apply current sort order
  const sc = ST.sortCol, sd = ST.sortDir;
  items.sort((a, b) => {
    let va = a[sc], vb = b[sc];
    if (sc === 'id') {
      const na = parseFloat(String(va??'').replace(/[^0-9.]/g,'')), nb = parseFloat(String(vb??'').replace(/[^0-9.]/g,''));
      if (!isNaN(na) && !isNaN(nb)) return sd==='asc' ? na-nb : nb-na;
    }
    if (sc==='cost'||sc==='value'||sc==='oz') {
      return sd==='asc' ? (parseFloat(va)||0)-(parseFloat(vb)||0) : (parseFloat(vb)||0)-(parseFloat(va)||0);
    }
    va = String(va??'').toLowerCase(); vb = String(vb??'').toLowerCase();
    return va < vb ? (sd==='asc'?-1:1) : va > vb ? (sd==='asc'?1:-1) : 0;
  });

  if (items.length === 0) { alert('No items match the current filter. Nothing to export.'); return; }

  const cols = ['Category','Record #','Description','Series','Grade','Cost','Numismatic Value','Melt Value','Gain','OZ','Sheet Key'];
  const rows = [cols.join(',')];

  items.forEach(i => {
    const sm    = SHEET_MAP[i.sheet];
    const cat   = sm ? sm.label : i.sheet;
    const cost  = i.cost > 0 ? i.cost : '';
    const value = i.value > 0 ? i.value : '';
    const gain  = (i.cost > 0 && i.value > 0) ? (i.value - i.cost).toFixed(2) : '';
    const oz    = i.oz > 0 ? i.oz : '';
    const melt = liveMelt(i);
    const meltOut = melt > 0 ? melt.toFixed(2) : '';
    const v = [cat, cn(i.id), i.desc||'', i.series||'', i.grade||'', cost, value, meltOut, gain, oz, i.sheet];
    rows.push(v.map(x => {
      const s = String(x ?? '');
      return (s.includes(',') || s.includes('"') || s.includes('\n'))
        ? '"' + s.replace(/"/g, '""') + '"'
        : s;
    }).join(','));
  });

  // Build descriptive filename based on filters
  const dt = new Date().toISOString().split('T')[0];
  let suffix = '';
  if (ST.filterSheet !== 'all') suffix += '_' + ST.filterSheet;
  else if (ST.filterGroup !== 'all') suffix += '_' + ST.filterGroup.replace(/[^a-z0-9]/gi, '');
  if (ST.search) suffix += '_search';
  const filename = 'collectibles_vault' + suffix + '_' + dt + '.csv';

  const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// Retry all pending unsynced operations: edits, adds (NEW_RECORDS), and deletes.
// Returns counts of {edits, adds, deletes} successfully synced.
async function retryPendingSync() {
  if (!GSHEETS_URL) return { edits:0, adds:0, deletes:0, total:0 };
  let edits = 0, adds = 0, deletes = 0;

  // Retry pending edits (give up after MAX_EDIT_RETRIES to avoid infinite loops)
  for (const key of Object.keys(PENDING_EDITS)) {
    const retryCount = (PENDING_EDIT_RETRIES[key] || 0) + 1;
    if (retryCount > MAX_EDIT_RETRIES) {
      console.warn('[retryPendingSync] Giving up on stuck edit after', retryCount, 'attempts:', key);
      // Keep in PENDING_EDITS so user can see/clear it, but stop retrying automatically
      continue;
    }
    PENDING_EDIT_RETRIES[key] = retryCount;
    localStorage.setItem('cv_pending_edit_retries', JSON.stringify(PENDING_EDIT_RETRIES));

    const [sheetKey, id] = key.split('|');
    const ok = await updateRecordInSheets(sheetKey, id, PENDING_EDITS[key]);
    if (ok) {
      delete PENDING_EDITS[key];
      delete PENDING_EDIT_RETRIES[key];
      savePendingEdits();
      localStorage.setItem('cv_pending_edit_retries', JSON.stringify(PENDING_EDIT_RETRIES));
      edits++;
    }
  }

  // Retry pending adds (NEW_RECORDS that haven't synced)
  for (const rec of [...NEW_RECORDS]) {
    if (!rec || !rec.sheet) continue;
    const sheetKey = rec.sheet;
    const { sheet, _localId, ...recData } = rec;
    const sid = await syncRecordToSheets(sheetKey, recData);
    if (sid) adds++;
  }

  // Retry pending deletes
  for (const del of [...PENDING_DELETES]) {
    const ok = await deleteRecordFromSheets(del.sheet, del.id);
    if (ok) deletes++;
  }

  const total = edits + adds + deletes;
  return { edits, adds, deletes, total };
}


// Clear all stuck pending edits that have exceeded MAX_EDIT_RETRIES
function clearStuckEdits() {
  const stuck = Object.keys(PENDING_EDITS).filter(k => (PENDING_EDIT_RETRIES[k] || 0) >= MAX_EDIT_RETRIES);
  if (stuck.length === 0) {
    alert('No stuck edits to clear. All pending edits are within retry limits.');
    return;
  }
  if (!confirm('Clear ' + stuck.length + ' stuck edit(s) that failed after ' + MAX_EDIT_RETRIES + ' attempts?\n\nThis removes them from the retry queue. The underlying data in the app is already correct — only the spreadsheet sync failed for these fields.')) return;
  stuck.forEach(k => {
    delete PENDING_EDITS[k];
    delete PENDING_EDIT_RETRIES[k];
  });
  savePendingEdits();
  localStorage.setItem('cv_pending_edit_retries', JSON.stringify(PENDING_EDIT_RETRIES));
  checkSyncState();
  if (ST.view === 'settings') renderSettings();
  alert('Cleared ' + stuck.length + ' stuck edit(s) from retry queue.');
}

async function manualSyncNow() {
  const hasSB    = !!(SB_URL && SB_KEY);
  const hasSheets = !!GSHEETS_URL;

  if (!hasSB && !hasSheets) {
    alert('No sync configured. Open Settings to connect Supabase or Google Sheets.');
    return;
  }

  updateSyncBanner('syncing', 'Syncing…');

  const results = { sb: null, sheets: null };

  // ── Push any pending local edits to both backends ─────────────────────────
  // Supabase: pending edits are written immediately on each change, so a
  // reload is sufficient to confirm the state is current.
  if (hasSB) {
    try {
      await loadFromSupabase();
      results.sb = 'ok';
    } catch(e) {
      results.sb = 'error: ' + e.message;
      console.error('[Sync] Supabase error:', e);
    }
  }

  // Google Sheets: retry any operations that didn't make it
  if (hasSheets) {
    try {
      const synced = await retryPendingSync();
      await loadFromSheets(GSHEETS_URL);
      results.sheets = synced.total > 0
        ? synced.edits + ' edit(s), ' + synced.adds + ' add(s), ' + synced.deletes + ' delete(s) synced'
        : 'ok';
    } catch(e) {
      results.sheets = 'error: ' + e.message;
      console.error('[Sync] Sheets error:', e);
    }
  }

  // ── Banner & summary ───────────────────────────────────────────────────────
  const parts = [];
  if (hasSB)     parts.push('Supabase: ' + (results.sb    === 'ok' ? '✓' : results.sb));
  if (hasSheets) parts.push('Sheets: '   + (results.sheets === 'ok' ? '✓' : results.sheets));

  const allOk = (!hasSB || results.sb === 'ok') && (!hasSheets || results.sheets.startsWith('ok') || !results.sheets.startsWith('error'));
  updateSyncBanner(allOk ? 'ok' : 'error', parts.join(' · '));

  // Show detail only if something interesting happened or there were errors
  const hasDetail = (results.sheets && results.sheets !== 'ok') || (!allOk);
  if (hasDetail) {
    let msg = 'Sync complete\n\n';
    if (hasSB)     msg += 'Supabase: '        + (results.sb    || '—') + '\n';
    if (hasSheets) msg += 'Google Sheets: '   + (results.sheets || '—') + '\n';
    const remaining = Object.keys(PENDING_EDITS).length + NEW_RECORDS.length + PENDING_DELETES.length;
    if (remaining > 0) msg += '\n⚠ ' + remaining + ' operation(s) still pending';
    alert(msg);
  }
}

function checkSyncState() {
  const pendEdits = (typeof PENDING_EDITS !== 'undefined') ? Object.keys(PENDING_EDITS).length : 0;
  const pendAdds  = (typeof NEW_RECORDS !== 'undefined') ? NEW_RECORDS.length : 0;
  const pendDels  = (typeof PENDING_DELETES !== 'undefined') ? PENDING_DELETES.length : 0;
  const stuckEdits = pendEdits > 0
    ? Object.keys(PENDING_EDITS).filter(k => (PENDING_EDIT_RETRIES[k] || 0) >= MAX_EDIT_RETRIES).length
    : 0;
  const totalUnsynced = pendEdits + pendAdds + pendDels;
  if (!GSHEETS_URL) {
    if (totalUnsynced > 0) updateSyncBanner('local', totalUnsynced + ' change(s)');
    else updateSyncBanner('none');
  } else if (SHEETS_LIVE) {
    if (totalUnsynced > 0) {
      const parts = [];
      if (pendEdits > 0) parts.push(pendEdits + ' edit(s)' + (stuckEdits > 0 ? ' (' + stuckEdits + ' stuck — <a href="#" onclick="clearStuckEdits();return false;" style="color:inherit">clear</a>)' : ''));
      if (pendAdds > 0)  parts.push(pendAdds + ' add(s)');
      if (pendDels > 0)  parts.push(pendDels + ' delete(s)');
      updateSyncBanner('error', parts.join(', ') + ' not yet synced — click Sync Now to retry');
    } else updateSyncBanner('ok');
  } else {
    updateSyncBanner('error', 'Connection lost');
  }
}

async function loadFromSheets(url){

    ['gold','silver','copper','platinum','palladium','mintSets','gradedSilver','rawSilver',
     'gradedUS','rawUS','gradedForeign','rawForeign','usNotes','confederate','obsolete',
     'foreignNotes','fractional','ancient','other'].forEach(k=>{if(d[k])D[k]=d[k];});

async function syncRecordToSheets(sheetKey, record) {
  if (SB_URL && SB_KEY) { try { await insertInSupabase(sheetKey, record); return; } catch(e) { console.error('[SB insert]', e); } }
  if (!GSHEETS_URL) return null;
  updateSyncBanner('sync');
  try {
    const url = GSHEETS_URL + '?action=addRecord&sheet=' + encodeURIComponent(sheetKey)
              + '&data=' + encodeURIComponent(JSON.stringify(record));
    const r = await fetch(url);
    const d = await r.json();
    if (!d || !d.ok) throw new Error((d && d.error) || 'Write failed');

    // Surface a clear summary of where the record was written
    const summary = '✓ Record #' + cn(d.id) + ' added\n'
      + '  Category sheet: ' + (d.targetWritten ? '✓ ' + d.targetSheet : '✗ FAILED');
    console.log(summary);

    // Move the confirmed record into MANUAL_LABELS so it stays in the in-app labels queue
    const confirmedId = d.id || record.id;
    const queueKey = sheetKey + '|' + cn(confirmedId);
    MANUAL_LABELS.add(queueKey);
    saveManualLabels();

    const lid = record._localId;
    NEW_RECORDS = NEW_RECORDS.filter(x => x._localId !== lid);
    saveNR();
    await loadFromSheets(GSHEETS_URL);
    updateSyncBanner('ok');
    return d.id;
  } catch(e) {
    updateSyncBanner('error', 'Sync failed: ' + e.message);
    return null;
  }
}
